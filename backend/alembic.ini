# Alembic 設定檔

[alembic]
# 腳本位置
script_location = alembic

# 前置系統路徑
prepend_sys_path = .

# 版本路徑分隔符
version_path_separator = os

# 模板檔案
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 資料庫 URL（會從環境變數覆蓋）
# sqlalchemy.url = postgresql://etf_user:etf_password@localhost:5432/etf_backtest

[post_write_hooks]
# 自動格式化腳本
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
